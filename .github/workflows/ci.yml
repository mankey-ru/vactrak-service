name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w @vactrak/shared
      - run: npm run build -w @vactrak/api
      - run: npm test -w @vactrak/api
        env:
          JWT_SECRET: ci-test-secret

  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w @vactrak/shared
      - run: npm run build -w @vactrak/web
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:3000
